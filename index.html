<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotspot — Date ideeën & uitjes in jouw buurt | Nederland</title>
    <meta name="description" content="Ontdek de leukste date-spots, restaurants, parken, musea en activiteiten bij jou in de buurt. Hotspot is de gratis kaartapp voor koppels in heel Nederland." />
    <meta name="keywords" content="date ideeën, uitjes, dingen te doen met partner, date spots nederland, restaurants buurt, parken, musea, activiteiten koppels, gratis uitjes nederland" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Hotspot" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Hotspot — Date ideeën & uitjes in jouw buurt" />
    <meta property="og:description" content="Ontdek de leukste date-spots, restaurants, parken en activiteiten bij jou in de buurt. Gratis, geen account nodig." />
    <meta property="og:site_name" content="Hotspot" />
    <meta property="og:locale" content="nl_NL" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hotspot — Date ideeën & uitjes in jouw buurt" />
    <meta name="twitter:description" content="Ontdek de leukste date-spots, restaurants, parken en activiteiten bij jou in de buurt. Gratis, geen account nodig." />

    <!-- JSON-LD: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Hotspot",
      "description": "Ontdek de leukste date-spots, restaurants, parken, musea en activiteiten bij jou in de buurt.",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      },
      "inLanguage": "nl",
      "audience": {
        "@type": "Audience",
        "audienceType": "Couples",
        "geographicArea": {
          "@type": "Country",
          "name": "Netherlands"
        }
      }
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Hotspot gratis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, Hotspot is volledig gratis en je hebt geen account nodig. Open de app en start direct met ontdekken."
          }
        },
        {
          "@type": "Question",
          "name": "Werkt Hotspot in heel Nederland?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja! Hotspot gebruikt OpenStreetMap-data en werkt in alle steden en dorpen van Nederland, van Amsterdam tot Maastricht."
          }
        },
        {
          "@type": "Question",
          "name": "Welke plekken zijn te vinden via Hotspot?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Restaurants, cafés, bars, parken, natuur, musea, theaters, bioscopen, bowlingbanen, escape rooms en meer."
          }
        },
        {
          "@type": "Question",
          "name": "Moet ik inloggen om Hotspot te gebruiken?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nee, geen account nodig. Je favorieten worden lokaal in je browser bewaard."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
